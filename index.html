<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login - S0LD Portal</title>
</head>
<body>

    <!-- UI für eingeloggte User -->
    <div id="user-ui" style="display: none;">
        <p>Willkommen, <span id="user-email"></span>!</p>
        <button id="logout-btn">Ausloggen</button>
    </div>

    <!-- UI für Gäste -->
    <div id="login-ui">
        <h2>Anmelden</h2>
        <form id="login-form">
            <input type="email" name="email" placeholder="E-Mail" required>
            <input type="password" name="password" placeholder="Passwort" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        // KONFIGURATION
        const SUPABASE_URL = 'https://jqmktlrythfmsxzevkjt.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Nw2I0O0YW4WfMQ4xRaSzLg_k4rShVPt';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // UI-Elemente
        const loginUi = document.getElementById('login-ui');
        const userUi = document.getElementById('user-ui');
        const userEmailSpan = document.getElementById('user-email');

        // Funktion: UI-Status basierend auf Session aktualisieren
        function updateUI(session) {
            if (session) {
                userEmailSpan.textContent = session.user.email;
                loginUi.style.display = 'none';
                userUi.style.display = 'block';
            } else {
                loginUi.style.display = 'block';
                userUi.style.display = 'none';
            }
        }

        // 1. Session beim Laden prüfen
        supabase.auth.getSession().then(({ data: { session } }) => {
            updateUI(session);
        });

        // 2. Login-Handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { data, error } = await supabase.auth.signInWithPassword({
                email: e.target.email.value,
                password: e.target.password.value,
            });

            if (error) return alert(error.message);
            updateUI(data.session);
        });

        // 3. Logout-Handler
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            updateUI(null);
        });

        // 4. Auf Login/Logout-Events hören (z.B. für automatisches Redirect)
        supabase.auth.onAuthStateChange((_event, session) => {
            updateUI(session);
        });
    </script>
</body>
</html>
