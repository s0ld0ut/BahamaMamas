<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bahama Mamas | Admin-Baukasten</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; }
        nav { background: #000; padding: 20px; text-align: center; border-bottom: 1px solid #ff00ff; }
        nav a { color: #888; margin: 0 15px; text-decoration: none; font-weight: bold; cursor: pointer; }
        #content { padding: 40px; max-width: 800px; margin: auto; }
        .card { background: #1a001a; padding: 20px; border-radius: 10px; border: 1px solid #ff00ff; }
        .btn { padding: 10px 20px; background: #ff00ff; color: #fff; border-radius: 5px; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <nav id="navbar"></nav>
    <div id="content" class="card">Lädt...</div>

    <script>
        const sb = supabase.createClient('https://jqmktlrythfmsxzevkjt.supabase.co', 'sb_publishable_Nw2I0O0YW4WfMQ4xRaSzLg_k4rShVPt');

        async function loadPage(slug) {
            const contentDiv = document.getElementById('content');
            
            // Wenn der Admin-Bereich aufgerufen wird
            if (slug === 'admin') {
                contentDiv.innerHTML = `
                    <div id="login-form">
                        <h2>Admin Login</h2>
                        <input type="email" id="email" placeholder="Email" style="display:block; width:90%; margin-bottom:10px; padding:10px;">
                        <input type="password" id="password" placeholder="Passwort" style="display:block; width:90%; margin-bottom:10px; padding:10px;">
                        <button class="btn" onclick="login()">Anmelden</button>
                    </div>
                    <div id="admin-dashboard" style="display:none;">
                        <h2>Admin Dashboard</h2>
                        <button class="btn" onclick="logout()">Logout</button>
                    </div>
                `;
                checkAuth();
            } else {
                const { data } = await sb.from('pages').select('*').eq('slug', slug).single();
                contentDiv.innerHTML = data ? data.content_html : 'Seite nicht gefunden';
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) alert(error.message); else checkAuth();
        }

        async function logout() {
            await sb.auth.signOut();
            location.reload();
        }

        async function checkAuth() {
            const { data } = await sb.auth.getSession();
            if (data.session) {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'block';
            }
        }

        async function initNav() {
            const { data } = await sb.from('pages').select('*').order('order');
            const nav = document.getElementById('navbar');
            data.forEach(page => {
                const a = document.createElement('a');
                a.innerText = page.title;
                a.onclick = () => loadPage(page.slug);
                nav.appendChild(a);
            });
            // Admin manuell hinzufügen
            const adminA = document.createElement('a');
            adminA.innerText = 'Admin';
            adminA.onclick = () => loadPage('admin');
            nav.appendChild(adminA);
            
            loadPage('home'); // Startseite
        }

        initNav();
    </script>
</body>
</html>
