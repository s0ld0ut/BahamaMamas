<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bahama Mamas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Hier kommen später deine CSS-Styles für das Design aus den Screenshots hin */
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .card { background: #1a001a; border: 1px solid #ff00ff; padding: 20px; margin: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <nav id="navbar">
        <a onclick="loadSection('home')">Home</a>
        <a onclick="loadSection('events')">Events</a>
        <a onclick="loadSection('menu')">Menü</a>
        <a onclick="loadSection('team')">Team</a>
        <a onclick="loadSection('bewerben')">Bewerben</a>
        <a onclick="loadSection('kontakt')">Kontakt</a>
        <a onclick="loadSection('admin')" style="color:red">Admin</a>
    </nav>
    <div id="content"></div>

    <script>
        const sb = supabase.createClient('URL', 'KEY');

        async function loadSection(section) {
            const content = document.getElementById('content');
            content.innerHTML = 'Lädt...';
            
            if (section === 'admin') {
                // Hier kommt die Admin-Logik mit Unterkategorien
                content.innerHTML = `
                    <div class="card">
                        <h2>Admin Dashboard</h2>
                        <button onclick="showAdminTab('events')">Events verwalten</button>
                        <button onclick="showAdminTab('bewerbungen')">Bewerbungen (${await getCount('applications')})</button>
                        <button onclick="showAdminTab('kontakt')">Kontaktanfragen (${await getCount('contact_requests')})</button>
                        <div id="admin-subcontent"></div>
                    </div>
                `;
            } else {
                // Hier laden wir die Inhalte für die öffentlichen Seiten
                const { data } = await sb.from(section).select('*');
                content.innerHTML = `<h2>${section.toUpperCase()}</h2>` + JSON.stringify(data);
            }
        }
        
        // Hilfsfunktion zum Zählen
        async function getCount(table) { const { count } = await sb.from(table).select('*', { count: 'exact' }); return count; }
        
        loadSection('home');
    </script>
</body>
</html>
