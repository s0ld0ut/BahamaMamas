<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // SUPABASE KONFIGURATION - HIER EIGENE WERTE EINTRAGEN
    const supabase = createClient('https://tlwamusobhrfbankdztv.supabase.co', 'sb_publishable_gb_bV7OV-qms-Fle3Vv2fg_e35hBGi1');

    // --- REVIDIERTE FUNKTIONEN ---

    // 1. Authentifizierung prüfen
    async function checkAuth() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            renderLoggedIn(user);
        } else {
            renderLoggedOut();
        }
    }

    // 2. Login
    loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        clearMessage(loginMessage);
        loginSubmit.disabled = true;

        try {
            const { email, password } = getFormPayload(loginForm);
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            
            renderLoggedIn(data.user);
        } catch (error) {
            showMessage(loginMessage, "Login fehlgeschlagen: " + error.message, "error");
        } finally {
            loginSubmit.disabled = false;
        }
    });

    // 3. Admin-Check (Beispiel für Datenbank-Prüfung statt Netlify-Rollen)
    async function hasAdminRole(user) {
        // Prüft in der Tabelle 'profiles', ob der User Admin ist
        const { data } = await supabase
            .from('profiles')
            .select('role')
            .eq('id', user.id)
            .single();
        return data?.role === 'admin';
    }

    // 4. Beispiel für Daten laden (Bewerbungen)
    async function loadApplications() {
        const { data, error } = await supabase
            .from('applications')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            applicationsList.innerHTML = "Fehler beim Laden.";
            return;
        }
        allApplications = data;
        renderApplications();
    }

    // [Füge hier analog die Funktionen für loadMenu, loadEvents, etc. ein, 
    // indem du 'apiFetch' durch 'supabase.from(...).select(...)' ersetzt]

    // Initialisierung
    checkAuth();
    
    // Auth-Listener für Session-Änderungen
    supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_OUT') renderLoggedOut();
    });

    // --- Logout ---
    logoutButton.addEventListener("click", async () => {
        await supabase.auth.signOut();
    });

</script>
