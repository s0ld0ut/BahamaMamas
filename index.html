<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bahama Mamas | Official</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background: #050505; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            /* Hier wird das Hintergrundbild eingebunden */
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('bg-palmen.jpg');
            background-attachment: fixed; 
            background-size: cover; 
            background-position: center;
        }
        .hero { text-align: center; padding: 40px; border-bottom: 1px solid #333; }
        @keyframes blink {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 10px #ff00ff); }
            50% { opacity: 0.8; filter: drop-shadow(0 0 5px #ff00ff); }
        }
        /* Korrekter Pfad für das Logo */
        .hero-logo { max-width: 600px; width: 100%; animation: blink 2s infinite ease-in-out; }
        nav { background: #000; padding: 15px; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        nav a { color: #888; margin: 0 15px; text-decoration: none; font-weight: bold; transition: 0.3s; padding-bottom: 5px; }
        nav a.active { color: #fff; border-bottom: 2px solid #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        nav a:hover { color: #ff00ff; }
        section { display: none; padding: 40px 20px; max-width: 1000px; margin: auto; }
        section:target { display: block; }
        body:not(:has(:target)) #home { display: block; }
        .card { background: rgba(20, 0, 40, 0.7); border: 1px solid #ff00ff; padding: 25px; border-radius: 15px; margin-bottom: 20px; }
        h2 { color: #ff00ff; border-bottom: 1px solid #ff00ff; padding-bottom: 10px; }
        .btn { display: inline-block; padding: 10px 20px; background: #ff00ff; color: #fff; border-radius: 5px; text-decoration: none; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hero">
        <!-- Dein Logo hier eingebunden -->
        <img src="BM-LOGO-NEU.png" alt="Bahama Mamas Logo" class="hero-logo">
    </div>

    <nav id="navbar">
        <a href="#home" class="active" onclick="setActive(this)">Home</a>
        <a href="#events" onclick="setActive(this)">Events</a>
        <a href="#menu" onclick="setActive(this)">Menü</a>
        <a href="#team" onclick="setActive(this)">Team</a>
        <a href="#apply" onclick="setActive(this)">Bewerben</a>
        <a href="#contact" onclick="setActive(this)">Kontakt</a>
        <a href="#admin" onclick="setActive(this)" style="color: #ff5555;">Admin Login</a>
    </nav>

    <section id="home"><div class="card"><h2>Home</h2><p>Willkommen im Neon Paradise.</p></div></section>
    <section id="events"><div class="card"><h2>Events</h2><p>Kommende Events werden geladen...</p></div></section>
    
    <section id="menu">
        <div class="card">
            <h2>Unser Menü</h2>
            <div id="menu-container">Daten werden geladen...</div>
        </div>
    </section>

    <section id="team"><div class="card"><h2>Management</h2><p>Jay & Isaac.</p></div></section>
    <section id="apply"><div class="card"><h2>Bewerben</h2><a href="#" class="btn">Jetzt bewerben</a></div></section>
    <section id="contact"><div class="card"><h2>Kontakt</h2><p>Über Birdy.</p></div></section>

    <section id="admin">
        <div class="card" id="login-form">
            <h2>Admin Login</h2>
            <input type="email" id="email" placeholder="Email" style="display:block; width:100%; margin-bottom:10px; padding:10px; border-radius:5px; border:none;">
            <input type="password" id="password" placeholder="Passwort" style="display:block; width:100%; margin-bottom:10px; padding:10px; border-radius:5px; border:none;">
            <button class="btn" onclick="login()">Anmelden</button>
        </div>
        <div id="admin-dashboard" style="display:none;" class="card">
            <h2>Admin Dashboard</h2>
            <p>Willkommen, Admin!</p>
            <button class="btn" onclick="logout()">Logout</button>
        </div>
    </section>

    <script>
        const SUPABASE_URL = 'https://jqmktlrythfmsxzevkjt.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Nw2I0O0YW4WfMQ4xRaSzLg_k4rShVPt';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else location.reload();
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        async function loadMenu() {
            const { data, error } = await supabase.from('menu').select('*');
            const container = document.getElementById('menu-container');
            if (error) {
                container.innerHTML = "Fehler beim Laden der Daten.";
                return;
            }
            container.innerHTML = data.length > 0 ? data.map(item => `
                <div style="border-bottom: 1px solid #333; padding: 10px 0;">
                    <strong>${item.name}</strong> - ${item.price}
                </div>
            `).join('') : "Keine Einträge gefunden.";
        }

        window.onload = () => {
            loadMenu();
            supabase.auth.getSession().then(({ data }) => {
                if (data.session) {
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('admin-dashboard').style.display = 'block';
                }
            });
        };

        function setActive(element) {
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
