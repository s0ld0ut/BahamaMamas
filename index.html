<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bahama Mamas | Admin-Baukasten</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; }
        nav { background: #000; padding: 20px; text-align: center; border-bottom: 1px solid #ff00ff; }
        nav a { color: #888; margin: 0 15px; text-decoration: none; font-weight: bold; cursor: pointer; }
        #content { padding: 40px; max-width: 800px; margin: auto; }
        .card { background: #1a001a; padding: 20px; border-radius: 10px; border: 1px solid #ff00ff; }
    </style>
</head>
<body>

    <nav id="navbar"></nav>
    <div id="content" class="card">Lädt...</div>

    <script>
        const sb = supabase.createClient('DEINE_SUPABASE_URL', 'DEIN_SUPABASE_ANON_KEY');

        async function loadPage(slug = 'home') {
            const { data } = await sb.from('pages').select('*').eq('slug', slug).single();
            document.getElementById('content').innerHTML = data ? data.content_html : 'Seite nicht gefunden';
        }

        async function initNav() {
            const { data } = await sb.from('pages').select('*').order('order');
            const nav = document.getElementById('navbar');
            data.forEach(page => {
                const a = document.createElement('a');
                a.innerText = page.title;
                a.onclick = () => loadPage(page.slug);
                nav.appendChild(a);
            });
            loadPage(); // Lade Home beim Start
        }

        initNav();
    </script>
</body>
</html>
